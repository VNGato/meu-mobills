<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeuMobills</title>
    
    <!-- PWA META TAGS -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="MeuMobills">
    
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; 
            max-width: 400px; margin: 0 auto; padding: 20px; background: #f8f9fa;
        }
        .header { text-align: center; padding: 20px 0; }
        .gasto { background: white; margin: 10px 0; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .alert { color: #dc3545; font-weight: bold; }
        button { 
            background: linear-gradient(45deg, #007bff, #0056b3); 
            color: white; border: none; padding: 12px 20px; border-radius: 8px; 
            cursor: pointer; font-weight: 600; transition: all 0.2s;
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,123,255,0.4); }
        button:active { transform: translateY(0); }
        input, select { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; 
            border: 2px solid #e9ecef; font-size: 16px;
        }
        input:focus, select:focus { border-color: #007bff; outline: none; }
        .renda-input { display: inline-block; width: 180px; }
        h3 { margin-top: 25px; color: #333; }
        #gastos-container {
            max-height: 300px; overflow-y: auto; border: 1px solid #dee2e6;
            border-radius: 12px; padding: 15px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        #gastos-container::-webkit-scrollbar { width: 6px; }
        #gastos-container::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        #gastos-container::-webkit-scrollbar-thumb { 
            background: linear-gradient(45deg, #007bff, #0056b3); border-radius: 10px; 
        }
        .fab { 
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; 
            background: linear-gradient(45deg, #28a745, #20c997); border-radius: 50%; 
            box-shadow: 0 4px 20px rgba(40,167,69,0.4); cursor: pointer;
        }
        @media (max-width: 480px) { body { padding: 15px; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>💰 MeuMobills</h1>
        <p>Seu controle financeiro</p>
    </div>
    
    <h3>Renda Mensal</h3>
    <div>R$ <input type="number" id="renda" class="renda-input" step="0.01" min="0" placeholder="5000"></div>
    
    <h3>+ Novo Gasto</h3>
    <input type="text" id="desc" placeholder="Descrição do gasto">
    <input type="number" id="valor" placeholder="25.50" step="0.01" min="0">
    <select id="cat">
        <option>Despesas</option>
        <option>Transporte</option>
        <option>Lazer</option>
        <option>Água</option>
        <option>Luz</option>
        <option>Aluguel</option>
    </select>
    <button onclick="addGasto()">➕ Adicionar Gasto</button>
    
    <h3>📊 Resumo Mensal</h3>
    <div id="resumo" style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);"></div>
    
    <h3>📈 Últimos Gastos</h3>
    <div id="gastos-container">
        <div id="gastos"></div>
    </div>
    
    <!-- FAB (Floating Action Button) -->
    <button class="fab" onclick="addGasto()" title="Novo Gasto">+</button>

    <script>
        // Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        let gastos = JSON.parse(localStorage.getItem('gastos')) || [];
        let rendaMensal = parseFloat(localStorage.getItem('rendaMensal')) || 5000;
        
        window.onload = function() {
            document.getElementById('renda').value = rendaMensal;
            atualiza();
        };
        
        document.getElementById('renda').addEventListener('change', function() {
            rendaMensal = parseFloat(this.value) || 0;
            localStorage.setItem('rendaMensal', rendaMensal);
            atualiza();
        });
        
        function addGasto() {
            let desc = document.getElementById('desc').value.trim();
            let valor = parseFloat(document.getElementById('valor').value) || 0;
            
            if (!desc || valor <= 0) {
                alert('Preencha descrição e valor válido!');
                return;
            }
            
            let novo = {
                id: Date.now(),
                desc: desc,
                valor: valor,
                cat: document.getElementById('cat').value,
                data: new Date().toLocaleDateString('pt-BR')
            };
            
            gastos.push(novo);
            localStorage.setItem('gastos', JSON.stringify(gastos));
            
            document.getElementById('desc').value = '';
            document.getElementById('valor').value = '';
            atualiza();
            
            // Scroll suave pro topo dos gastos
            document.getElementById('gastos-container').scrollTop = 0;
        }
        
        function atualiza() {
            let totalGastos = gastos.reduce((sum, g) => sum + g.valor, 0);
            let porcentagem = rendaMensal > 0 ? (totalGastos / rendaMensal * 100).toFixed(1) : 0;
            let restante = Math.max(0, rendaMensal - totalGastos);
            
            document.getElementById('resumo').innerHTML = `
                <div style="text-align:center;">
                    <h2 style="margin:0;color:#007bff">R$ ${totalGastos.toFixed(2)}</h2>
                    <p style="color:#666;margin:5px 0">Gastos Totais</p>
                    <div style="display:flex;justify-content:space-around;margin:15px 0;">
                        <div><strong>${porcentagem}%</strong><br>Usado</div>
                        <div style="color:#28a745"><strong>R$ ${restante.toFixed(2)}</strong><br>Restante</div>
                    </div>
                    ${porcentagem > 90 ? '<p class="alert">🚨 ORÇAMENTO QUASE ESTOURADO!</p>' : ''}
                </div>
            `;
            
            let lista = '';
            gastos.slice(-20).reverse().forEach(g => {
                lista += `<div class="gasto">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <div>
                            <strong>${g.data}</strong><br>
                            <small>${g.desc} • R$ ${g.valor.toFixed(2)}</small>
                        </div>
                        <div style="color:#007bff;font-weight:bold">${g.cat}</div>
                    </div>
                    <button onclick="removeGasto(${g.id})" style="float:right;background:#dc3545;font-size:12px;padding:5px 12px;margin-top:8px">✕</button>
                </div>`;
            });
            
            if (gastos.length === 0) {
                lista = '<div style="text-align:center;padding:30px;color:#666"><p>Nenhum gasto ainda!</p><p>🎉 Adicione o primeiro</p></div>';
            }
            
            document.getElementById('gastos').innerHTML = lista;
        }
        
        function removeGasto(id) {
            gastos = gastos.filter(g => g.id !== id);
            localStorage.setItem('gastos', JSON.stringify(gastos));
            atualiza();
        }
        
        document.getElementById('valor').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addGasto();
        });
    </script>
</body>
</html>
